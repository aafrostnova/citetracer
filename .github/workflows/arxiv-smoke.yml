name: ArXiv Seed Smoke

on:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:
    inputs:
      query:
        description: "arXiv query (API search_query format)"
        required: false
        default: "cat:cs.LG"
      max_results:
        description: "Number of seed papers to fetch"
        required: false
        default: "3"
  schedule:
    - cron: "0 10 * * 1"

jobs:
  arxiv-seed-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pypdf

      - name: Fetch ArXiv Seed Data (PDF + Source)
        run: |
          QUERY="${{ github.event.inputs.query || 'cat:cs.LG' }}"
          MAX_RESULTS="${{ github.event.inputs.max_results || '3' }}"
          python scripts/fetch_arxiv_seed.py \
            --query "$QUERY" \
            --max-results "$MAX_RESULTS" \
            --pdf-output-dir /tmp/arxiv_seed_pdfs \
            --source-output-dir /tmp/arxiv_seed_sources \
            --metadata-out artifacts/arxiv_seed_metadata.jsonl \
            --manifest-out artifacts/arxiv_seed_manifest.json \
            --mirror-out artifacts/arxiv_seed_mirror.jsonl \
            --download-pdfs \
            --download-sources \
            --extract-sources

      - name: Run ArXiv Pipeline Smoke (PDF + Source)
        env:
          CITATION_CHECKER_CACHE_PATH: /tmp/arxiv_seed_cache/cache.sqlite
          CITATION_CHECKER_DBLP_MIRROR_PATH: artifacts/arxiv_seed_mirror.jsonl
          CITATION_CHECKER_OFFLINE_ONLY: "0"
        run: |
          python scripts/run_arxiv_seed_smoke.py \
            --manifest artifacts/arxiv_seed_manifest.json \
            --out artifacts/arxiv_smoke \
            --pipelines both

      - name: Upload ArXiv Smoke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-seed-smoke
          path: |
            artifacts/arxiv_seed_metadata.jsonl
            artifacts/arxiv_seed_manifest.json
            artifacts/arxiv_seed_mirror.jsonl
            artifacts/arxiv_smoke/summary.json
            artifacts/arxiv_smoke/reports
